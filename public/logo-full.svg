<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4338ca;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon mark background -->
  <rect x="5" y="10" width="100" height="100" rx="24" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect x="5" y="10" width="100" height="100" rx="24" fill="url(#shineGrad)"/>
  <rect x="5" y="10" width="100" height="100" rx="24" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>

  <!-- Letter A in icon -->
  <path d="M55 28 L30 92 L42 92 L55 57 L68 92 L80 92 Z" fill="url(#letterGrad)"/>
  <path d="M55 28 L42 92 L68 92 Z" fill="url(#bgGrad)" opacity="0.7"/>
  <!-- Crossbar -->
  <rect x="40" y="70" width="30" height="7" rx="3.5" fill="url(#accentGrad)"/>
  <!-- Bottom serifs -->
  <rect x="26" y="88" width="18" height="6" rx="3" fill="url(#letterGrad)" opacity="0.7"/>
  <rect x="66" y="88" width="18" height="6" rx="3" fill="url(#letterGrad)" opacity="0.7"/>

  <!-- Text: AccounTech -->
  <text x="126" y="65"
        font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="42"
        font-weight="900"
        letter-spacing="-1"
        fill="url(#textGrad)">AccounTech</text>

  <!-- Text: BD — accent color -->
  <text x="126" y="95"
        font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="16"
        font-weight="700"
        letter-spacing="6"
        fill="#6366f1"
        opacity="0.9">BD ERP PLATFORM</text>

  <!-- Accent underline -->
  <rect x="126" y="100" width="280" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.6"/>
</svg>
